<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema ERP para la gestión de usuarios, equipos, tareas y movimientos en Tecnofilm." />
    <meta name="theme-color" content="#0f172a" />
    <title>Tecnofilm ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Bloquea todas las animaciones durante la carga inicial */
      .preload * {
        transition: none !important;
      }
    </style>
  </head>
  <body class="preload">
    <!-- Script de inicialización rápida para evitar el parpadeo blanco (FOUC) -->
    <script>
      (function() {
        try {
          var isDark = localStorage.getItem("darkMode");
          // Si es true o si no existe (por defecto true)
          if (isDark === "true" || isDark === null) {
            document.body.classList.add("dark-mode");
          }
          
          var dyslexia = localStorage.getItem("dyslexiaFont") === "true";
          if (dyslexia) document.body.classList.add("dyslexia-font");

          var colorFilter = localStorage.getItem("colorFilter");
          if (colorFilter && colorFilter !== 'none') {
            document.body.classList.add('filter-' + colorFilter);
          }
          
          var fontSize = localStorage.getItem("fontSize");
          if (fontSize) {
            document.documentElement.style.fontSize = fontSize;
          }
        } catch (e) {}
      })();
    </script>
    
    <!-- Filtros SVG de Daltonismo para Accesibilidad -->
    <svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="protanopia">
          <feColorMatrix type="matrix" values="0.567, 0.433, 0, 0, 0  0.558, 0.442, 0, 0, 0  0, 0.242, 0.758, 0, 0  0, 0, 0, 1, 0" />
        </filter>
        <filter id="deuteranopia">
          <feColorMatrix type="matrix" values="0.625, 0.375, 0, 0, 0  0.7, 0.3, 0, 0, 0  0, 0.3, 0.7, 0, 0  0, 0, 0, 1, 0" />
        </filter>
        <filter id="tritanopia">
          <feColorMatrix type="matrix" values="0.95, 0.05, 0, 0, 0  0, 0.433, 0.567, 0, 0  0, 0.475, 0.525, 0, 0  0, 0, 0, 1, 0" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
